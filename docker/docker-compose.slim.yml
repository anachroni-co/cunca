services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: capibara-slim:latest
    ports:
      - "8000:8000"
    environment:
      - CAPIBARA_MODEL_BACKEND=auto
      - CAPIBARA_LOGGING_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
