# Project information
site_name: CapibaraGPT v3
site_url: https://anachroni-co.github.io/capibaraGPT_v3/
site_description: >-
  CapibaraGPT v3 — Advanced multi-backend LLM framework with neuroplasticity,
  meta-learning, abstract reasoning, and modular layer orchestration.

# Repository
repo_name: anachroni-co/capibaraGPT_v3
repo_url: https://github.com/anachroni-co/capibaraGPT_v3

# Copyright
copyright: "&copy; 2026 Anachroni Co"

# Configuration
theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: lucide/moon-star
        name: Switch to light mode

# Plugins
plugins:
  - search

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Page tree
nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Backends: architecture/backends.md
      - Layers: architecture/layers.md
      - Module Gate: architecture/module-gate.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Configuration: guides/configuration.md
      - Adding Layers: guides/adding-layers.md
  - API Reference:
      - Core: api/core.md
      - Layers: api/layers.md
      - Training: api/training.md
  - Contributing:
      - Code Standards: contributing/code-standards.md
      - Factorization Rules: contributing/factorization-rules.md
