# Capibara Slim — default configuration
# Minimal set of fields required for the Slim MVP.

api:
  host: "0.0.0.0"
  port: 8000

inference:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  timeout_seconds: 30

routing:
  # Strategy: "length" picks model by token count; "always_transformer" or
  # "always_mamba" force a fixed backend for testing.
  strategy: "length"
  mamba_threshold: 128   # inputs shorter than this (tokens) go to Mamba

model:
  # "auto"        — router decides (transformer vs mamba by input length)
  # "stub"        — canned response, no weights needed
  # "transformer" — HuggingFace causal LM (requires torch + transformers)
  # "mamba"       — Mamba SSM (requires mamba-ssm; stub until weights added)
  backend: "auto"
  path: "models/tiny-gpt2"

safety:
  input_filter: true
  output_filter: true

cache:
  enabled: false   # set true to cache identical requests in memory
  max_size: 256

logging:
  level: "INFO"

quantization:
  enabled: false            # set true to apply INT8 post-training quantization
  weight_percentile: 99.9   # percentile for per-channel scale computation
  preserve_float16: true    # keep non-quantizable tensors as float16

auth:
  enabled: false            # set true to require API key on /generate endpoints
  # Key is read from CAPIBARA_API_KEY env var when enabled

rate_limit:
  enabled: false            # set true to enable per-IP sliding window throttle
  requests_per_minute: 60
  burst: 10                 # max simultaneous excess before hard 429
