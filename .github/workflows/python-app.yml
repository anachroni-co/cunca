# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest fastapi uvicorn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Validate syntax and imports
      run: |
        # Compile all Python files to catch syntax errors early
        python -m compileall -q . -x '__pycache__|\.git|build|\.egg|venv'
        # Run import validation script
        python scripts/validate_imports.py
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Factorization guardrails
      run: |
        pytest tests/unit/test_factorization.py -v
    - name: Observability schema gate
      run: |
        pytest tests/unit/test_observability_schema.py -v
    - name: Test with pytest
      run: |
        pytest

  docker-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and start MVP API container
      run: |
        docker compose up -d --build
    - name: Run MVP API smoke test
      run: |
        bash scripts/smoke_mvp_api.sh
    - name: Dump container logs on failure
      if: failure()
      run: |
        docker compose logs --no-color
    - name: Stop containers
      if: always()
      run: |
        docker compose down -v
